# ================================================================
# iScan — Apache VirtualHost Configuration for Synology NAS
# ================================================================
# HOW TO USE:
#   Option A (recommended): Configure via DSM > Web Station > Web Service Portal
#     - Set document root to /volume1/web/iscan
#     - Enable PHP 8.2 profile with php_synology.ini settings
#     - Ensure AllowOverride All is enabled (so .htaccess works)
#
#   Option B (advanced): Place in /etc/httpd/conf/sites-enabled/ via SSH
#     sudo cp apache_synology.conf /etc/httpd/conf/sites-enabled/iscan.conf
#     sudo synoservice --restart pkgctl-Apache2.2  (or Apache 2.4 depending on DSM)
# ================================================================

<VirtualHost *:80>
    # Change ServerName to your NAS hostname or IP
    ServerName iscan.local
    ServerAlias 192.168.*.*

    # Project root (adjust if you placed it elsewhere)
    DocumentRoot /volume1/web/iscan
    DirectoryIndex public/login.php index.php

    # ---- Main directory configuration ----
    <Directory /volume1/web/iscan>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ---- Protect sensitive directories (extra layer beyond .htaccess) ----
    <DirectoryMatch "^/volume1/web/iscan/(includes|database|logs|scanner_service)">
        Require all denied
    </DirectoryMatch>

    # ---- Protect sensitive file types ----
    <FilesMatch "\.(env|log|sql|sh|bat|md|gitignore|bak|backup)$">
        Require all denied
    </FilesMatch>

    # ---- Logging ----
    ErrorLog /volume1/web/iscan/logs/apache_error.log
    CustomLog /volume1/web/iscan/logs/apache_access.log combined
    LogLevel warn
</VirtualHost>

