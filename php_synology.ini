; ================================================================
; iScan — PHP 8.2 Configuration for Synology NAS
; ================================================================
; HOW TO USE:
;   Option A (recommended): DSM > Web Station > PHP Settings
;     Click "Edit" on the PHP 8.2 profile, then paste these
;     settings into the "Additional .ini settings" section.
;
;   Option B (SSH): Place in PHP's conf.d directory
;     sudo cp php_synology.ini /usr/local/etc/php82/conf.d/iscan.ini
;     sudo synoservice --restart pkgctl-PHP8.2
; ================================================================

; ---- Upload limits (for large PDF scans) ----
upload_max_filesize = 20M
post_max_size = 25M
max_file_uploads = 20

; ---- Execution limits ----
memory_limit = 256M
max_execution_time = 120
max_input_time = 120

; ---- Session configuration ----
session.gc_maxlifetime = 3600
session.cookie_httponly = 1
session.cookie_samesite = Lax
; session.cookie_secure = 1   ; Uncomment only if using HTTPS

; ---- Timezone ----
date.timezone = Asia/Manila

; ---- Required extensions (ensure these are enabled in Web Station) ----
; extension = pdo_mysql     ; Required — for database
; extension = mbstring      ; Required — for UTF-8 string handling
; extension = json          ; Required — built-in PHP 8.x
; extension = fileinfo      ; Required — for MIME type detection
; extension = gd            ; Required — for image processing (OCR thumbnails)
; extension = curl          ; Optional — for external HTTP requests

; ---- Error handling (production) ----
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /volume1/web/iscan/logs/php_errors.log
error_reporting = E_ALL & ~E_NOTICE & ~E_DEPRECATED

; ---- Performance ----
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 4000
opcache.revalidate_freq = 60

; ---- Security ----
expose_php = Off
