<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Duplicate Registry Check</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
        }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Test Duplicate Registry Number Check</h1>

    <div class="test-section">
        <h2>Manual Test</h2>
        <input type="text" id="testRegistryNo" placeholder="Enter registry number" style="padding: 8px; width: 200px;">
        <select id="testRecordType" style="padding: 8px;">
            <option value="birth">Birth</option>
            <option value="marriage">Marriage</option>
            <option value="death">Death</option>
            <option value="marriage_license">Marriage License</option>
        </select>
        <button onclick="testDuplicateCheck()">Check Duplicate</button>
        <div id="testResult" class="result" style="display: none;"></div>
    </div>

    <div class="test-section">
        <h2>Console Log</h2>
        <p>Open browser console (F12) to see detailed logs</p>
    </div>

    <script>
        async function testDuplicateCheck() {
            const registryNo = document.getElementById('testRegistryNo').value;
            const recordType = document.getElementById('testRecordType').value;
            const resultDiv = document.getElementById('testResult');

            if (!registryNo) {
                alert('Please enter a registry number');
                return;
            }

            console.log('Testing duplicate check:', { registryNo, recordType });

            try {
                const formData = new FormData();
                formData.append('registry_no', registryNo);
                formData.append('record_type', recordType);

                const response = await fetch('./api/check_duplicate_registry.php', {
                    method: 'POST',
                    body: formData
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);

                const data = await response.json();
                console.log('Response data:', data);

                resultDiv.style.display = 'block';

                if (data.success) {
                    if (data.data && data.data.exists) {
                        resultDiv.innerHTML = `<strong class="error">DUPLICATE FOUND!</strong><br>Registry: ${data.data.registry_no}<br>Record ID: ${data.data.record_id}`;
                    } else {
                        resultDiv.innerHTML = `<strong class="success">Registry number is available!</strong>`;
                    }
                } else {
                    resultDiv.innerHTML = `<strong class="error">Error:</strong> ${data.message}`;
                }
            } catch (error) {
                console.error('Error:', error);
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<strong class="error">Network Error:</strong> ${error.message}`;
            }
        }
    </script>
</body>
</html>
